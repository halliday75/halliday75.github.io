<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>RSVP Reader Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    /* GLOBAL FIX: Ensures padding doesn't cause overflow */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #000;
      --fg: #fff;
      --accent: #ff3b3b;
      --ui-gray: #111;
      --card-bg: #161616;
      --text-muted: #888;
      /* Typography variables */
      --reader-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --reader-font-size: clamp(32px, 10vw, 35px);
      --reader-font-weight: 400;
      --reader-letter-spacing: -1px;
      --reader-line-height: 1.2;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      user-select: none;
      overflow: hidden;
      width: 100vw;
      height: 100dvh;
    }

    /* ---------- SCREEN MANAGEMENT ---------- */
    .screen {
      display: none;
      height: 100dvh;
      width: 100%;
      flex-direction: column;
    }
    .screen.active {
      display: flex;
    }

    /* ---------- LIBRARY UI ---------- */
    .library-header {
      padding: 30px 20px 10px 20px;
    }

    .library-content {
      flex: 1;
      padding: 0 20px 20px 20px;
      overflow-y: auto;
      max-width: 650px;
      margin: 0 auto;
      width: 100%;
    }

    .upload-zone {
      margin-bottom: 25px;
    }

    #fileInput { display: none; }

    .upload-label {
      display: block;
      padding: 30px;
      border: 2px dashed #333;
      border-radius: 16px;
      text-align: center;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-label:active {
      border-color: var(--accent);
      background: #0a0a0a;
    }

    .book-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 15px;
      cursor: pointer;
      border: 1px solid #222;
    }

    .book-info {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
      gap: 15px;
    }

    .book-title {
      font-weight: 700;
      font-size: 17px;
      line-height: 1.3;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .delete-btn {
      background: rgba(255, 59, 59, 0.1);
      color: var(--accent);
      border: 1px solid rgba(255, 59, 59, 0.2);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .progress-container {
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s;
    }

    /* ---------- READER UI ---------- */
    .topbar {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid #111;
      background: var(--bg);
      z-index: 10;
      transition: opacity 0.3s;
    }

    .nav-btn {
      font-size: 14px;
      font-weight: 500;
      color: var(--fg);
      padding: 10px;
      cursor: pointer;
    }

    #chapterTitle {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 50%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      cursor: pointer;
    }

    .reader-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .word-box {
      font-family: var(--reader-font);
      font-size: var(--reader-font-size);
      font-weight: var(--reader-font-weight);
      letter-spacing: var(--reader-letter-spacing);
      line-height: var(--reader-line-height);
      text-align: center;
      transition: font-family 0.3s, font-size 0.3s, font-weight 0.3s;
    }

    .orp { color: var(--accent); }

    /* Focus Mode */
    .focus-group {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .context-word {
      position: absolute;
      opacity: 0.15;
      font-weight: 400;
      white-space: nowrap;
      pointer-events: none;
    }
    .prev-word { right: 100%; margin-right: 15px; }
    .next-word { left: 100%; margin-left: 15px; }

    /* Bottom Bar */
    .bottom-bar {
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 1px solid #111;
      transition: opacity 0.3s;
      gap: 40px;
    }

    .settings-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: #080808;
      cursor: pointer;
      color: var(--fg);
    }

    .wpm-controls {
      display: flex;
      align-items: center;
      gap: 35px;
    }

    .wpm-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: #080808;
      cursor: pointer;
    }

    #wpmDisplay {
      font-size: 20px;
      font-weight: 800;
      min-width: 80px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    /* HUDs & Overlays */
    .speed-hud {
      position: absolute;
      top: 65%;
      font-size: 50px;
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      color: rgba(255,255,255,0.1);
    }
    .speed-hud.show { opacity: 1; }

    .menu-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      display: none;
      flex-direction: column;
    }
    .menu-overlay.active { display: flex; }
    
    .menu-header {
      padding: 20px;
      border-bottom: 1px solid #222;
      text-align: right;
      font-weight: bold;
      color: var(--accent);
      cursor: pointer;
    }

    .menu-list {
      flex: 1;
      overflow-y: auto;
    }

    .menu-item {
      padding: 20px;
      border-bottom: 1px solid #111;
      font-size: 16px;
      color: #aaa;
      cursor: pointer;
    }
    .menu-item.active {
      color: var(--fg);
      background: #0a0a0a;
      border-left: 4px solid var(--accent);
    }

    .ui-hidden { opacity: 0; pointer-events: none; }

    .progress-line {
      position: fixed;
      top: 59px;
      left: 0;
      height: 2px;
      background: var(--accent);
      width: 0%;
      z-index: 11;
    }

    /* ---------- SETTINGS MENU ---------- */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      display: none;
      flex-direction: column;
    }
    .settings-overlay.active { display: flex; }

    .settings-header {
      padding: 20px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .settings-title {
      font-size: 18px;
      font-weight: 700;
    }

    .settings-close {
      color: var(--accent);
      font-weight: bold;
      cursor: pointer;
      padding: 10px;
    }

    .settings-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .setting-group {
      margin-bottom: 30px;
    }

    .setting-label {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .font-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    .font-option {
      padding: 15px;
      background: var(--card-bg);
      border: 2px solid #222;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .font-option.selected {
      border-color: var(--accent);
      background: rgba(255, 59, 59, 0.1);
    }

    .font-option:active {
      background: #1a1a1a;
    }

    .font-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .font-preview {
      font-size: 18px;
      opacity: 0.5;
    }

    .size-slider-container {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .size-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 6px;
      background: #222;
      border-radius: 3px;
      outline: none;
    }

    .size-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    .size-value {
      font-size: 16px;
      font-weight: 700;
      min-width: 60px;
      text-align: center;
    }

    .toggle-options {
      display: flex;
      gap: 10px;
    }

    .toggle-btn {
      flex: 1;
      padding: 12px;
      background: var(--card-bg);
      border: 2px solid #222;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .toggle-btn.selected {
      border-color: var(--accent);
      background: rgba(255, 59, 59, 0.1);
    }

    .preset-btn {
      padding: 12px 20px;
      background: var(--card-bg);
      border: 1px solid #222;
      border-radius: 8px;
      color: var(--fg);
      cursor: pointer;
      font-size: 14px;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    .preset-btn:active {
      background: #1a1a1a;
    }
  </style>
</head>
<body>

<div id="libScreen" class="screen active">
  <div class="library-header">
    <h1>Library</h1>
  </div>
  <div class="library-content">
    <div class="upload-zone">
      <input type="file" id="fileInput" accept=".epub"/>
      <label for="fileInput" class="upload-label">
        <strong>+ Add EPUB</strong><br>
        <span style="font-size: 12px; opacity: 0.5">Drag and drop or tap to browse</span>
      </label>
    </div>
    <div id="bookContainer"></div>
  </div>
</div>

<div id="readScreen" class="screen">
  <div id="uiTop" class="topbar">
    <div class="nav-btn" onclick="toggleFocus()">Focus</div>
    <div id="chapterTitle" onclick="openMenu()">Loading...</div>
    <div class="nav-btn" onclick="exitReader()">Back</div>
  </div>

  <div class="progress-line" id="topProgress"></div>

  <div class="reader-view" id="mainTouch">
    <div id="speedHUD" class="speed-hud">300</div>
    <div id="wordDisplay" class="word-box"></div>
  </div>

  <div id="uiBottom" class="bottom-bar">
    <div class="settings-btn" onclick="openSettings()">⚙</div>
    <div class="wpm-controls">
      <div class="wpm-btn" id="minusBtn">−</div>
      <div id="wpmDisplay">300</div>
      <div class="wpm-btn" id="plusBtn">+</div>
    </div>
  </div>
</div>

<div id="menuOverlay" class="menu-overlay">
  <div class="menu-header" onclick="closeMenu()">✕ CLOSE</div>
  <div id="chapterList" class="menu-list"></div>
</div>

<!-- Settings Overlay -->
<div id="settingsOverlay" class="settings-overlay">
  <div class="settings-header">
    <div class="settings-title">Typography Settings</div>
    <div class="settings-close" onclick="closeSettings()">✕ CLOSE</div>
  </div>
  <div class="settings-content">
    <!-- Font Family -->
    <div class="setting-group">
      <div class="setting-label">Typeface</div>
      <div class="font-grid" id="fontFamilyGrid">
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- Font Size -->
    <div class="setting-group">
      <div class="setting-label">Font Size</div>
      <div class="size-slider-container">
        <span style="font-size: 12px;">A</span>
        <input type="range" class="size-slider" id="sizeSlider" min="16" max="120" value="35">
        <span style="font-size: 24px;">A</span>
        <div class="size-value" id="sizeValue">35px</div>
      </div>
    </div>

    <!-- Font Weight -->
    <div class="setting-group">
      <div class="setting-label">Font Weight</div>
      <div class="toggle-options" id="fontWeightOptions">
        <div class="toggle-btn" data-weight="300">Light</div>
        <div class="toggle-btn selected" data-weight="400">Regular</div>
        <div class="toggle-btn" data-weight="600">Semibold</div>
        <div class="toggle-btn" data-weight="700">Bold</div>
      </div>
    </div>

    <!-- Letter Spacing -->
    <div class="setting-group">
      <div class="setting-label">Letter Spacing</div>
      <div class="toggle-options" id="letterSpacingOptions">
        <div class="toggle-btn" data-spacing="-2">Tight</div>
        <div class="toggle-btn selected" data-spacing="-1">Default</div>
        <div class="toggle-btn" data-spacing="0">Normal</div>
        <div class="toggle-btn" data-spacing="2">Wide</div>
      </div>
    </div>

    <!-- Line Height -->
    <div class="setting-group">
      <div class="setting-label">Line Height (Focus Mode)</div>
      <div class="toggle-options" id="lineHeightOptions">
        <div class="toggle-btn" data-height="1">Compact</div>
        <div class="toggle-btn selected" data-height="1.2">Default</div>
        <div class="toggle-btn" data-height="1.5">Relaxed</div>
        <div class="toggle-btn" data-height="2">Spacious</div>
      </div>
    </div>

    <!-- Presets -->
    <div class="setting-group">
      <div class="setting-label">Quick Presets</div>
      <div>
        <button class="preset-btn" onclick="applyPreset('classic')">Classic</button>
        <button class="preset-btn" onclick="applyPreset('modern')">Modern</button>
        <button class="preset-btn" onclick="applyPreset('minimal')">Minimal</button>
        <button class="preset-btn" onclick="applyPreset('large')">Large Print</button>
      </div>
    </div>
  </div>
</div>

<script>
/**
 * APP STATE
 */
let db;
let currentBook = null;
let words = [];
let chapters = [];
let wordIndex = 0;
let speed = 300;
let holdDirection = 0; // -1: back, 0: stop, 1: fwd
let timer = null;
let isFocusMode = false;
let currentChapterIndex = 0;

// Typography settings
let typographySettings = {
  fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
  fontSize: 35,
  fontWeight: 400,
  letterSpacing: -1,
  lineHeight: 1.2
};

// Available fonts
const availableFonts = [
  { name: 'System', family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif', preview: 'Aa' },
  { name: 'Georgia', family: 'Georgia, serif', preview: 'Aa' },
  { name: 'Times', family: '"Times New Roman", serif', preview: 'Aa' },
  { name: 'Mono', family: '"Courier New", monospace', preview: 'Aa' },
  { name: 'Arial', family: 'Arial, sans-serif', preview: 'Aa' },
  { name: 'Verdana', family: 'Verdana, sans-serif', preview: 'Aa' },
  { name: 'Helvetica', family: '"Helvetica Neue", sans-serif', preview: 'Aa' },
  { name: 'Garamond', family: 'Garamond, serif', preview: 'Aa' }
];

// Typography presets
const presets = {
  classic: {
    fontFamily: 'Georgia, serif',
    fontSize: 32,
    fontWeight: 400,
    letterSpacing: 0,
    lineHeight: 1.5
  },
  modern: {
    fontFamily: '"Helvetica Neue", sans-serif',
    fontSize: 35,
    fontWeight: 300,
    letterSpacing: -1,
    lineHeight: 1.2
  },
  minimal: {
    fontFamily: 'Arial, sans-serif',
    fontSize: 28,
    fontWeight: 400,
    letterSpacing: -2,
    lineHeight: 1
  },
  large: {
    fontFamily: 'Verdana, sans-serif',
    fontSize: 60,
    fontWeight: 600,
    letterSpacing: 1,
    lineHeight: 1.5
  }
};

/* --- DATABASE SETUP --- */
const request = indexedDB.open("RSVP_FINAL_DB", 5);
request.onupgradeneeded = e => {
  db = e.target.result;
  if (!db.objectStoreNames.contains("books")) {
    db.createObjectStore("books", { keyPath: "id" });
  }
};
request.onsuccess = e => { 
  db = e.target.result; 
  loadLibrary();
  loadTypographySettings();
};

/**
 * TYPOGRAPHY SETTINGS FUNCTIONS
 */
function loadTypographySettings() {
  const saved = localStorage.getItem('rsvpTypography');
  if (saved) {
    typographySettings = { ...typographySettings, ...JSON.parse(saved) };
  }
  applyTypographySettings();
}

function saveTypographySettings() {
  localStorage.setItem('rsvpTypography', JSON.stringify(typographySettings));
}

function applyTypographySettings() {
  const root = document.documentElement.style;
  root.setProperty('--reader-font', typographySettings.fontFamily);
  root.setProperty('--reader-font-size', `clamp(16px, 10vw, ${typographySettings.fontSize}px)`);
  root.setProperty('--reader-font-weight', typographySettings.fontWeight);
  root.setProperty('--reader-letter-spacing', typographySettings.letterSpacing + 'px');
  root.setProperty('--reader-line-height', typographySettings.lineHeight);
  
  // Update UI elements
  document.getElementById('sizeSlider').value = typographySettings.fontSize;
  document.getElementById('sizeValue').textContent = typographySettings.fontSize + 'px';
  
  // Update font family grid
  document.querySelectorAll('.font-option').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.family === typographySettings.fontFamily);
  });
  
  // Update weight buttons
  document.querySelectorAll('#fontWeightOptions .toggle-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.weight) === typographySettings.fontWeight);
  });
  
  // Update letter spacing buttons
  document.querySelectorAll('#letterSpacingOptions .toggle-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.spacing) === typographySettings.letterSpacing);
  });
  
  // Update line height buttons
  document.querySelectorAll('#lineHeightOptions .toggle-btn').forEach(btn => {
    btn.classList.toggle('selected', parseFloat(btn.dataset.height) === typographySettings.lineHeight);
  });
}

function openSettings() {
  document.getElementById('settingsOverlay').classList.add('active');
  generateFontGrid();
  applyTypographySettings();
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('active');
  saveTypographySettings();
}

function generateFontGrid() {
  const grid = document.getElementById('fontFamilyGrid');
  grid.innerHTML = availableFonts.map(font => `
    <div class="font-option ${font.family === typographySettings.fontFamily ? 'selected' : ''}" 
         data-family="${font.family}"
         onclick="selectFont('${font.family.replace(/'/g, "\\'")}')">
      <div class="font-name">${font.name}</div>
      <div class="font-preview" style="font-family: ${font.family}">${font.preview}</div>
    </div>
  `).join('');
}

function selectFont(family) {
  typographySettings.fontFamily = family;
  applyTypographySettings();
  renderCurrentWord();
}

// Font size slider
document.getElementById('sizeSlider').addEventListener('input', (e) => {
  typographySettings.fontSize = parseInt(e.target.value);
  applyTypographySettings();
  renderCurrentWord();
});

// Font weight options
document.querySelectorAll('#fontWeightOptions .toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    typographySettings.fontWeight = parseInt(btn.dataset.weight);
    applyTypographySettings();
    renderCurrentWord();
  });
});

// Letter spacing options
document.querySelectorAll('#letterSpacingOptions .toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    typographySettings.letterSpacing = parseInt(btn.dataset.spacing);
    applyTypographySettings();
    renderCurrentWord();
  });
});

// Line height options
document.querySelectorAll('#lineHeightOptions .toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    typographySettings.lineHeight = parseFloat(btn.dataset.height);
    applyTypographySettings();
    renderCurrentWord();
  });
});

function applyPreset(presetName) {
  const preset = presets[presetName];
  if (preset) {
    typographySettings = { ...typographySettings, ...preset };
    applyTypographySettings();
    renderCurrentWord();
  }
}

/**
 * LIBRARY FUNCTIONS
 */
function loadLibrary() {
  const container = document.getElementById("bookContainer");
  const tx = db.transaction("books", "readonly");
  tx.objectStore("books").getAll().onsuccess = e => {
    const list = e.target.result.sort((a,b) => b.lastOpened - a.lastOpened);
    if (!list.length) {
      container.innerHTML = `<div style="text-align:center; color:#444; padding-top:40px">Your library is empty.</div>`;
      return;
    }
    container.innerHTML = list.map(b => {
      const progress = Math.floor((b.wordIndex / b.words.length) * 100) || 0;
      return `
        <div class="book-card" onclick="openBook('${b.id}')">
          <div class="book-info">
            <div class="book-title">${b.title}</div>
            <div class="delete-btn" onclick="deleteBook('${b.id}', event)">Delete</div>
          </div>
          <div class="progress-container">
            <div class="progress-fill" style="width: ${progress}%"></div>
          </div>
        </div>
      `;
    }).join("");
  };
}

function deleteBook(id, e) {
  e.stopPropagation();
  if (confirm("Delete this book and its progress?")) {
    db.transaction("books", "readwrite").objectStore("books").delete(id).onsuccess = loadLibrary;
  }
}

/**
 * EPUB PARSER (ROBUST VERSION)
 */
async function parseEPUB(file) {
  const zip = await JSZip.loadAsync(file);
  
  // 1. Find the OPF file
  const containerXml = await zip.file("META-INF/container.xml").async("string");
  const opfPath = new DOMParser().parseFromString(containerXml, "text/xml")
                   .querySelector("rootfile").getAttribute("full-path");
  
  const opfDir = opfPath.includes("/") ? opfPath.substring(0, opfPath.lastIndexOf("/") + 1) : "";
  const opfContent = await zip.file(opfPath).async("string");
  const opfDoc = new DOMParser().parseFromString(opfContent, "text/xml");

  // 2. Map Manifest
  const manifest = {};
  opfDoc.querySelectorAll("item").forEach(el => {
    manifest[el.getAttribute("id")] = el.getAttribute("href");
  });

  // 3. Define Spine (Reading order)
  const spine = Array.from(opfDoc.querySelectorAll("itemref")).map(el => manifest[el.getAttribute("idref")]);

  // Helper to fix relative paths
  const resolvePath = (rel) => {
    let absolute = opfDir + rel;
    const parts = absolute.split("/");
    const stack = [];
    for (const part of parts) {
      if (part === "..") stack.pop();
      else if (part !== ".") stack.push(part);
    }
    return stack.join("/");
  };

  // 4. Try to get Table of Contents (Nav or NCX)
  let tocData = {}; // href -> Title
  const navItem = opfDoc.querySelector("item[properties~='nav']");
  const ncxId = opfDoc.querySelector("spine").getAttribute("toc");

  if (navItem) {
    try {
      const navStr = await zip.file(resolvePath(navItem.getAttribute("href"))).async("string");
      const navDoc = new DOMParser().parseFromString(navStr, "text/html");
      navDoc.querySelectorAll("nav a").forEach(a => {
        const href = a.getAttribute("href").split("#")[0];
        if (!tocData[href]) tocData[href] = a.textContent.trim();
      });
    } catch (e) {}
  } else if (ncxId) {
    try {
      const ncxStr = await zip.file(resolvePath(manifest[ncxId])).async("string");
      const ncxDoc = new DOMParser().parseFromString(ncxStr, "text/xml");
      ncxDoc.querySelectorAll("navPoint").forEach(pt => {
        const href = pt.querySelector("content").getAttribute("src").split("#")[0];
        const label = pt.querySelector("text").textContent.trim();
        if (!tocData[href]) tocData[href] = label;
      });
    } catch (e) {}
  }

  // 5. Extract Text and build Chapters
  let allWords = [];
  let bookChapters = [];

  for (const href of spine) {
    const fileData = zip.file(resolvePath(href));
    if (!fileData) continue;

    const html = await fileData.async("string");
    const doc = new DOMParser().parseFromString(html, "text/html");
    
    // Clean up title: Priority TOC -> H1/H2 -> Filename
    let title = tocData[href] || tocData[href.split('/').pop()];
    if (!title) {
      const h = doc.querySelector("h1, h2, h3");
      title = h ? h.textContent.trim() : href.split('/').pop().replace(/\.[^/.]+$/, "").replace(/[_-]/g, " ");
    }

    // Filter "garbage" names (split/part files)
    const lowerTitle = title.toLowerCase();
    const isFragment = lowerTitle.includes('split') || lowerTitle.includes('part') || lowerTitle.includes('fm00');
    
    if (!isFragment || bookChapters.length === 0) {
      bookChapters.push({ title: title.substring(0, 60), start: allWords.length });
    }

    const textContent = (doc.body.innerText || doc.body.textContent).replace(/\s+/g, ' ').trim();
    if (textContent) {
      const chunk = textContent.split(' ').filter(w => w.length > 0);
      allWords = allWords.concat(chunk);
    }
  }

  return { words: allWords, chapters: bookChapters };
}

/**
 * READER CORE
 */
function openBook(id) {
  db.transaction("books", "readonly").objectStore("books").get(id).onsuccess = e => {
    currentBook = e.target.result;
    words = currentBook.words;
    chapters = currentBook.chapters;
    wordIndex = currentBook.wordIndex || 0;
    speed = currentBook.speed || 300;
    
    document.getElementById("libScreen").classList.remove("active");
    document.getElementById("readScreen").classList.add("active");
    
    updateWPM(false);
    renderCurrentWord();
    updateChapterUI();
  };
}

function exitReader() {
  saveProgress();
  document.getElementById("readScreen").classList.remove("active");
  document.getElementById("libScreen").classList.add("active");
  loadLibrary();
}

function saveProgress() {
  if (!currentBook) return;
  currentBook.wordIndex = wordIndex;
  currentBook.speed = speed;
  currentBook.lastOpened = Date.now();
  db.transaction("books", "readwrite").objectStore("books").put(currentBook);
}

// Auto-save progress every 5 seconds
setInterval(saveProgress, 5000);

/**
 * RSVP RENDERING & SPEED ENGINE
 */
function getORP(word) {
  const len = word.length;
  if (len <= 1) return 0;
  if (len <= 5) return 1;
  if (len <= 9) return 2;
  return 3;
}

function renderCurrentWord() {
  const word = words[wordIndex] || "";
  const orp = getORP(word);
  
  const format = (w) => {
    if (!w) return "";
    return w.split('').map((c, i) => i === orp ? `<span class="orp">${c}</span>` : c).join('');
  };

  const display = document.getElementById("wordDisplay");
  if (isFocusMode) {
    display.innerHTML = `
      <div class="focus-group">
        <span class="context-word prev-word">${format(words[wordIndex-1])}</span>
        <span>${format(word)}</span>
        <span class="context-word next-word">${format(words[wordIndex+1])}</span>
      </div>
    `;
  } else {
    display.innerHTML = format(word);
  }

  // Top progress line
  const pct = (wordIndex / words.length) * 100;
  document.getElementById("topProgress").style.width = pct + "%";
}

/* SMART SPEED LOGIC: Granular delays for punctuation */
function getDelay() {
  let baseMs = 60000 / speed;
  const word = words[wordIndex] || "";
  
  if (/[.!?]/.test(word)) baseMs *= 2.0;       // Sentence ends
  else if (/[,;:]/.test(word)) baseMs *= 1.5;  // Pauses
  
  if (word.length > 8) baseMs *= 1.2;          // Long words
  
  return baseMs;
}

function step() {
  if (holdDirection === 0) return;
  
  if (holdDirection === 1 && wordIndex < words.length - 1) wordIndex++;
  else if (holdDirection === -1 && wordIndex > 0) wordIndex--;
  
  renderCurrentWord();
  updateChapterUI();
  
  timer = setTimeout(step, getDelay());
}

/**
 * INTERACTION HANDLERS
 */
const touchArea = document.getElementById("mainTouch");
touchArea.addEventListener("touchstart", e => {
  e.preventDefault();
  const side = e.touches[0].clientX < window.innerWidth / 2 ? -1 : 1;
  holdDirection = side;
  
  document.getElementById("uiTop").classList.add("ui-hidden");
  document.getElementById("uiBottom").classList.add("ui-hidden");
  
  step();
});

document.addEventListener("touchend", () => {
  holdDirection = 0;
  clearTimeout(timer);
  document.getElementById("uiTop").classList.remove("ui-hidden");
  document.getElementById("uiBottom").classList.remove("ui-hidden");
});

function updateWPM(showHud = true) {
  document.getElementById("wpmDisplay").textContent = speed;
  if (showHud) {
    const hud = document.getElementById("speedHUD");
    hud.textContent = speed;
    hud.classList.add("show");
    setTimeout(() => hud.classList.remove("show"), 400);
  }
}

document.getElementById("minusBtn").onclick = () => { speed = Math.max(50, speed - 10); updateWPM(); };
document.getElementById("plusBtn").onclick = () => { speed = Math.min(1200, speed + 10); updateWPM(); };

function toggleFocus() {
  isFocusMode = !isFocusMode;
  renderCurrentWord();
}

/**
 * CHAPTER MANAGEMENT
 */
function updateChapterUI() {
  for (let i = 0; i < chapters.length; i++) {
    if (wordIndex >= chapters[i].start) currentChapterIndex = i;
  }
  document.getElementById("chapterTitle").textContent = chapters[currentChapterIndex]?.title || "Reading";
}

function openMenu() {
  const list = document.getElementById("chapterList");
  list.innerHTML = chapters.map((c, i) => `
    <div class="menu-item ${i === currentChapterIndex ? 'active' : ''}" onclick="jumpToChapter(${i})">
      ${c.title}
    </div>
  `).join("");
  document.getElementById("menuOverlay").classList.add("active");
}

function closeMenu() {
  document.getElementById("menuOverlay").classList.remove("active");
}

function jumpToChapter(index) {
  wordIndex = chapters[index].start;
  closeMenu();
  renderCurrentWord();
  updateChapterUI();
}

/**
 * FILE INPUT HANDLER
 */
document.getElementById("fileInput").onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;

  try {
    const data = await parseEPUB(file);
    const book = {
      id: "book_" + Date.now(),
      title: file.name.replace(".epub", ""),
      words: data.words,
      chapters: data.chapters,
      wordIndex: 0,
      speed: 300,
      lastOpened: Date.now()
    };

    const tx = db.transaction("books", "readwrite");
    tx.objectStore("books").put(book).onsuccess = loadLibrary;
  } catch (err) {
    alert("Error parsing EPUB file.");
    console.error(err);
  }
};
</script>

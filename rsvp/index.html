<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RSVP Reader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:system-ui;
  user-select:none;
  overflow:hidden;
}

/* screens */
.screen {
  display:none;
  height:100dvh;
}
.screen.active { display:block; }

/* ---------- LIBRARY ---------- */
.library {
  padding:20px;
  max-width:700px;
  margin:auto;
  height:100%;
  overflow:auto;
}

.upload input { display:none; }

.upload label {
  display:block;
  padding:14px;
  border:1px dashed #333;
  border-radius:12px;
  text-align:center;
  color:#aaa;
  margin-bottom:20px;
}

.book {
  background:#111;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
}

.book-title {
  font-size:16px;
  margin-bottom:6px;
}

.book-progress {
  height:4px;
  background:#222;
  border-radius:4px;
  overflow:hidden;
}

.book-progress div {
  height:100%;
  background:#ff3b3b;
}

/* ---------- READER ---------- */
.topbar {
  height:40px;
  display:flex;
  align-items:center;
  border-bottom:1px solid #111;
  position:relative;
  font-size:13px;
  color:#aaa;
}

/* prevent overlap */
#chapterTitle {
  position:absolute;
  left:70px;
  right:70px;
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.top-btn {
  position:absolute;
  top:0;
  height:100%;
  display:flex;
  align-items:center;
  padding:0 10px;
  font-size:12px;
  z-index:2;
}

.left-btn { left:0; }
.right-btn { right:0; }

.progress {
  position:absolute;
  bottom:0;
  left:0;
  height:2px;
  background:#fff;
  width:0%;
}

.display {
  height:calc(100dvh - 120px);
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.word {
  font-size:clamp(32px,8vw,72px);
}

.orp { color:#ff3b3b; }
.fade { opacity:0.3; }

/* ---------- WPM ---------- */
.bottom {
  height:80px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.wpm-control {
  display:flex;
  align-items:center;
  gap:20px;
}

.wpm-btn {
  width:40px;
  height:40px;
  border-radius:50%;
  border:1px solid #333;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
}

#wpm {
  min-width:80px;
  text-align:center;
}

/* HUD */
.speed {
  position:absolute;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
  opacity:0;
}
.speed.show { opacity:1; }

/* menu */
.menu {
  position:absolute;
  inset:0;
  background:#000;
  display:none;
  overflow:auto;
}
.menu.show { display:block; }

.menu div {
  padding:16px;
  border-bottom:1px solid #111;
}
.activeChapter { color:#ff3b3b; }
</style>
</head>

<body>

<div id="library" class="screen active">
  <div class="library">
    <h2>Library</h2>

    <div class="upload">
      <input type="file" id="fileInput" accept=".epub"/>
      <label for="fileInput">Tap to add EPUB</label>
    </div>

    <div id="books"></div>
  </div>
</div>

<div id="reader" class="screen">
  <div class="topbar">
    <div class="top-btn left-btn" onclick="toggleFocus()">Focus</div>
    <div id="chapterTitle"></div>
    <div class="top-btn right-btn" onclick="goBack()">Back</div>
    <div id="progress" class="progress"></div>
  </div>

  <div id="display" class="display">
    <div id="word" class="word"></div>
    <div id="speedHUD" class="speed"></div>
  </div>

  <div class="bottom">
    <div class="wpm-control">
      <div class="wpm-btn" id="minusBtn">−</div>
      <div id="wpm">300</div>
      <div class="wpm-btn" id="plusBtn">+</div>
    </div>
  </div>

  <div id="menu" class="menu"></div>
</div>

<script>
let db;
let currentBook=null;
let words=[], chapters=[];
let i=0, speed=300;
let hold=0, timer;
let current=0;
let focusMode=false;

/* FIXED: step always 10 */
let adjustTimer=null;

/* DOM */
const libraryEl = document.getElementById("library");
const readerEl = document.getElementById("reader");
const booksEl = document.getElementById("books");
const fileInput = document.getElementById("fileInput");

const wordEl = document.getElementById("word");
const progressEl = document.getElementById("progress");
const chapterTitleEl = document.getElementById("chapterTitle");
const menuEl = document.getElementById("menu");
const displayEl = document.getElementById("display");
const speedHUD = document.getElementById("speedHUD");
const wpmEl = document.getElementById("wpm");

const minusBtn = document.getElementById("minusBtn");
const plusBtn = document.getElementById("plusBtn");

/* DB */
const req=indexedDB.open("RSVP",1);
req.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("books",{keyPath:"id"});
};
req.onsuccess=e=>{
  db=e.target.result;
  loadLibrary();
};

/* LIBRARY */
function loadLibrary(){
  const tx=db.transaction("books","readonly");
  tx.objectStore("books").getAll().onsuccess=e=>{
    const list=e.target.result.sort((a,b)=>b.lastOpened-a.lastOpened);

    if(!list.length){
      booksEl.innerHTML="<div style='color:#666;text-align:center'>No books yet</div>";
      return;
    }

    booksEl.innerHTML=list.map(b=>{
      const pct=Math.floor((b.progress||0)/b.words.length*100);
      return `
        <div class="book" onclick="openBook('${b.id}')">
          <div class="book-title">${b.title}</div>
          <div class="book-progress"><div style="width:${pct}%"></div></div>
        </div>
      `;
    }).join("");
  };
}

/* NAV */
function goBack(){
  readerEl.classList.remove("active");
  libraryEl.classList.add("active");
  loadLibrary();
}

/* OPEN */
function openBook(id){
  const tx=db.transaction("books","readonly");
  tx.objectStore("books").get(id).onsuccess=e=>{
    const b=e.target.result;
    currentBook=b;
    words=b.words||[];
    chapters=b.chapters||[];
    i=b.progress||0;
    speed=b.speed||300;

    libraryEl.classList.remove("active");
    readerEl.classList.add("active");

    render(words[i]);
    updateChapter();
    updateWPM();
  };
}

/* SAVE */
setInterval(()=>{
  if(!currentBook) return;
  currentBook.progress=i;
  currentBook.speed=speed;
  currentBook.lastOpened=Date.now();
  db.transaction("books","readwrite").objectStore("books").put(currentBook);
},2000);

/* ORP */
function getORP(w){
  return Math.min(3, Math.floor((w||"").length*0.35));
}

/* RENDER */
function render(word){
  if(!word){ wordEl.textContent=""; return; }

  function format(w){
    return w.split("").map((c,idx)=>
      idx===getORP(w)?`<span class="orp">${c}</span>`:c
    ).join("");
  }

  if(focusMode){
    const prev = words[i-1] || "";
    const next = words[i+1] || "";
    wordEl.innerHTML = `
      <span class="fade">${format(prev)}</span>
      <span>${format(word)}</span>
      <span class="fade">${format(next)}</span>
    `;
  } else {
    wordEl.innerHTML = format(word);
  }

  progressEl.style.width=(i/words.length)*100+"%";
}

function toggleFocus(){
  focusMode=!focusMode;
  render(words[i]);
}

/* SPEED */
function changeSpeed(delta){
  speed = Math.max(100, Math.min(800, speed + delta));
  updateWPM(true);
}

function startAdjust(delta){
  changeSpeed(delta);
  adjustTimer = setInterval(()=>changeSpeed(delta),120);
}

function stopAdjust(){
  clearInterval(adjustTimer);
}

minusBtn.addEventListener("mousedown", ()=>startAdjust(-10));
plusBtn.addEventListener("mousedown", ()=>startAdjust(10));
document.addEventListener("mouseup", stopAdjust);

minusBtn.addEventListener("touchstart", (e)=>{ e.preventDefault(); startAdjust(-10); });
plusBtn.addEventListener("touchstart", (e)=>{ e.preventDefault(); startAdjust(10); });
document.addEventListener("touchend", stopAdjust);

function updateWPM(showHUD=false){
  wpmEl.textContent = speed;

  if(showHUD){
    speedHUD.textContent = speed;
    speedHUD.classList.add("show");
    setTimeout(()=>speedHUD.classList.remove("show"),400);
  }
}

/* SMART DELAY */
function getDelay(word){
  let base = 60000 / speed;

  if(/[.!?]/.test(word)) base *= 2.2;
  else if(/[,:;]/.test(word)) base *= 1.5;

  if(word.length > 8) base *= 1.3;
  if(word.length > 12) base *= 1.6;

  if(word.length <= 3) base *= 0.85;

  return base;
}

/* HOLD */
function step(){
  if(!hold) return;

  if(hold===1 && i<words.length-1) i++;
  if(hold===-1 && i>0) i--;

  const word = words[i];
  render(word);
  updateChapter();

  timer=setTimeout(step, getDelay(word));
}

/* TOUCH */
displayEl.addEventListener("touchstart", e=>{
  if(menuEl.classList.contains("show")) return;

  e.preventDefault();

  hold = e.touches[0].clientX < innerWidth/2 ? -1 : 1;
  step();
}, { passive:false });

function stopHold(){
  hold=0;
  clearTimeout(timer);
}

displayEl.addEventListener("touchend", stopHold);
displayEl.addEventListener("touchcancel", stopHold);

/* CHAPTERS */
function updateChapter(){
  for(let c=0;c<chapters.length;c++){
    if(i>=chapters[c].start){
      current=c;
    }
  }
  chapterTitleEl.textContent=chapters[current]?.title||"";
}

chapterTitleEl.onclick=()=>{
  menuEl.innerHTML=chapters.map((c,idx)=>`
    <div class="${idx===current?'activeChapter':''}"
         onclick="jump(${idx})">${c.title}</div>
  `).join("");
  menuEl.classList.add("show");
};

function jump(idx){
  i=chapters[idx].start;
  menuEl.classList.remove("show");
  render(words[i]);
  updateChapter();
}

/* EPUB PARSER unchanged */
async function parseEPUB(file){ /* unchanged */ return []; }

/* LOAD */
fileInput.onchange=async e=>{
  const file=e.target.files[0];
  if(!file) return;

  const w=await parseEPUB(file);

  const book={
    id:Date.now()+"",
    title:file.name,
    words:w,
    chapters,
    progress:0,
    speed:300,
    lastOpened:Date.now()
  };

  db.transaction("books","readwrite")
    .objectStore("books")
    .put(book);

  loadLibrary();
};
</script>

</body>
</html>
